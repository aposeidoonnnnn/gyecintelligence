<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GYEC 2026 — Finals Intelligence</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700&family=IBM+Plex+Mono:wght@300;400;500&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f5f3ef;
  --surface: #ffffff;
  --surface2: #f0ede8;
  --border: #d8d3cc;
  --border2: #000000;
  --accent: #c41e3a;
  --accent2: #1a3a5c;
  --text: #0a0a0a;
  --text-dim: #888;
  --text-mid: #444;
  --high: #c41e3a;
  --mid: #c47e1e;
  --low: #1a7a3a;
  --you: #1a3a5c;
  --list-w: 320px;
}
[data-theme="dark"] {
  --bg: #0c0c0c;
  --surface: #141414;
  --surface2: #1c1c1c;
  --border: #2a2a2a;
  --border2: #ffffff;
  --text: #e8e4de;
  --text-dim: #555;
  --text-mid: #999;
  --high: #f54242;
  --mid: #f5a442;
  --low: #42c46a;
  --you: #42aaff;
}
* { margin:0; padding:0; box-sizing:border-box; }
html,body { height:100%; overflow:hidden; }
body { background:var(--bg); color:var(--text); font-family:'IBM Plex Sans',sans-serif; display:flex; flex-direction:column; }

/* TOP BAR */
.topbar {
  display:grid;
  grid-template-columns:var(--list-w) 1fr;
  border-bottom:2px solid var(--border2);
  flex-shrink:0;
}
.topbar-left {
  padding:16px 20px;
  border-right:1px solid var(--border);
  display:flex;
  align-items:center;
  gap:12px;
}
.logo {
  font-family:'Playfair Display',serif;
  font-size:18px;
  font-weight:900;
  letter-spacing:-0.5px;
  line-height:1;
}
.logo em { font-style:italic; color:var(--accent); }
.logo-sub {
  font-family:'IBM Plex Mono',monospace;
  font-size:9px;
  color:var(--text-dim);
  letter-spacing:2px;
  text-transform:uppercase;
  margin-top:3px;
}
.topbar-right {
  padding:0 28px;
  display:flex;
  align-items:center;
  justify-content:space-between;
}
.topbar-meta {
  display:flex;
  gap:32px;
  align-items:center;
}
.meta-item { text-align:center; }
.meta-val {
  font-family:'Playfair Display',serif;
  font-size:22px;
  font-weight:700;
  line-height:1;
}
.meta-val.red { color:var(--high); }
.meta-val.orange { color:var(--mid); }
.meta-val.green { color:var(--low); }
.meta-val.blue { color:var(--you); }
.meta-label {
  font-family:'IBM Plex Mono',monospace;
  font-size:8px;
  color:var(--text-dim);
  letter-spacing:2px;
  text-transform:uppercase;
  margin-top:2px;
}
.score-block {
  border-left:1px solid var(--border);
  padding-left:28px;
  display:flex;
  align-items:center;
  gap:16px;
}
.score-tag {
  background:var(--you);
  color:#fff;
  font-family:'IBM Plex Mono',monospace;
  font-size:9px;
  padding:3px 8px;
  letter-spacing:1px;
  text-transform:uppercase;
}
.score-num {
  font-family:'Playfair Display',serif;
  font-size:28px;
  font-weight:900;
  color:var(--you);
  line-height:1;
}
.score-denom {
  font-family:'IBM Plex Mono',monospace;
  font-size:9px;
  color:var(--text-dim);
  letter-spacing:1px;
  display:block;
  margin-top:2px;
}

/* TICKER */
.ticker {
  background:var(--text);
  color:#fff;
  height:28px;
  display:flex;
  align-items:center;
  overflow:hidden;
  flex-shrink:0;
}
.ticker-inner {
  display:flex;
  animation:tick 40s linear infinite;
  white-space:nowrap;
  gap:0;
}
.ticker-item {
  font-family:'IBM Plex Mono',monospace;
  font-size:10px;
  letter-spacing:1px;
  padding:0 24px;
  border-right:1px solid #333;
  display:flex;
  align-items:center;
  gap:8px;
  height:28px;
}
.ticker-item .dot { width:5px; height:5px; border-radius:50%; flex-shrink:0; }
.dot.high{background:var(--high);} .dot.mid{background:var(--mid);} .dot.low{background:var(--low);} .dot.you{background:#42d4f5;}
@keyframes tick { 0%{transform:translateX(0);} 100%{transform:translateX(-50%);} }

/* MAIN SPLIT */
.main {
  display:grid;
  grid-template-columns:var(--list-w) 1fr;
  flex:1;
  overflow:hidden;
}

/* LEFT — TEAM LIST */
.list-panel {
  border-right:1px solid var(--border);
  display:flex;
  flex-direction:column;
  overflow:hidden;
}
.list-search {
  padding:12px 16px;
  border-bottom:1px solid var(--border);
  flex-shrink:0;
  position:relative;
}
.list-search input {
  width:100%;
  background:var(--surface2);
  border:1px solid var(--border);
  padding:8px 12px 8px 32px;
  font-family:'IBM Plex Mono',monospace;
  font-size:11px;
  color:var(--text);
  outline:none;
  transition:border-color .15s;
}
.list-search input:focus { border-color:var(--text); }
.list-search input::placeholder { color:var(--text-dim); }
.list-search::before {
  content:'⌕';
  position:absolute;
  left:25px;
  top:50%;
  transform:translateY(-50%);
  font-size:16px;
  color:var(--text-dim);
  pointer-events:none;
}
.list-scroll {
  overflow-y:auto;
  flex:1;
}
.list-scroll::-webkit-scrollbar { width:3px; }
.list-scroll::-webkit-scrollbar-thumb { background:var(--border); }

.group-header {
  padding:10px 16px 4px;
  display:flex;
  align-items:center;
  gap:8px;
  position:sticky;
  top:0;
  background:var(--bg);
  z-index:2;
}
.group-label {
  font-family:'IBM Plex Mono',monospace;
  font-size:8px;
  color:var(--text-dim);
  letter-spacing:3px;
  text-transform:uppercase;
}
.group-line { flex:1; height:1px; background:var(--border); }
.group-count {
  font-family:'IBM Plex Mono',monospace;
  font-size:8px;
  color:var(--text-dim);
}

.team-row {
  display:flex;
  align-items:center;
  padding:9px 16px;
  cursor:pointer;
  border-bottom:1px solid transparent;
  transition:background .1s;
  gap:10px;
  border-left:3px solid transparent;
}
.team-row:hover { background:var(--surface); }
.team-row.active {
  background:var(--surface);
  border-left-color:var(--text);
}
.tr-num {
  font-family:'IBM Plex Mono',monospace;
  font-size:9px;
  color:var(--text-dim);
  width:20px;
  flex-shrink:0;
}
.tr-info { flex:1; min-width:0; }
.tr-name {
  font-size:13px;
  font-weight:500;
  color:var(--text-mid);
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
  line-height:1.2;
}
.team-row:hover .tr-name, .team-row.active .tr-name { color:var(--text); }
.tr-country {
  font-family:'IBM Plex Mono',monospace;
  font-size:9px;
  color:var(--text-dim);
  margin-top:1px;
}
.tr-right {
  display:flex;
  flex-direction:column;
  align-items:flex-end;
  gap:3px;
  flex-shrink:0;
}
.tr-members {
  font-family:'IBM Plex Mono',monospace;
  font-size:8px;
  color:var(--text-dim);
}
.tr-threat {
  width:6px;
  height:6px;
  border-radius:50%;
  flex-shrink:0;
}
.tr-threat.high { background:var(--high); }
.tr-threat.mid { background:var(--mid); }
.tr-threat.low { background:var(--low); }
.tr-threat.you { background:var(--you); }

/* RIGHT — DETAIL */
.detail-panel {
  overflow-y:auto;
  background:var(--surface);
}
.detail-panel::-webkit-scrollbar { width:4px; }
.detail-panel::-webkit-scrollbar-thumb { background:var(--border); }

.empty-state {
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  height:100%;
  gap:12px;
}
.empty-title {
  font-family:'Playfair Display',serif;
  font-size:36px;
  font-weight:400;
  font-style:italic;
  color:var(--border);
}
.empty-sub {
  font-family:'IBM Plex Mono',monospace;
  font-size:10px;
  color:var(--border);
  letter-spacing:2px;
  text-transform:uppercase;
}

/* DETAIL CONTENT */
.detail-inner { padding:36px 48px; max-width:820px; }

.d-eyebrow {
  font-family:'IBM Plex Mono',monospace;
  font-size:9px;
  color:var(--text-dim);
  letter-spacing:3px;
  text-transform:uppercase;
  margin-bottom:8px;
  display:flex;
  align-items:center;
  gap:12px;
}
.d-divider { flex:1; height:1px; background:var(--border); }

.d-headline {
  font-family:'Playfair Display',serif;
  font-size:48px;
  font-weight:900;
  line-height:1;
  margin-bottom:4px;
  letter-spacing:-1px;
}
.d-subhead {
  font-family:'IBM Plex Mono',monospace;
  font-size:10px;
  color:var(--text-dim);
  letter-spacing:1px;
  margin-bottom:20px;
  display:flex;
  align-items:center;
  gap:16px;
  flex-wrap:wrap;
}
.d-subhead span { display:flex; align-items:center; gap:6px; }
.d-subhead span::before { content:'·'; color:var(--border); }
.d-subhead span:first-child::before { content:''; }

.d-badge {
  display:inline-flex;
  align-items:center;
  gap:6px;
  padding:4px 10px;
  font-family:'IBM Plex Mono',monospace;
  font-size:9px;
  font-weight:500;
  letter-spacing:2px;
  text-transform:uppercase;
  border:1px solid;
  margin-bottom:24px;
}
.d-badge.high { color:var(--high); border-color:var(--high); background:rgba(196,30,58,.06); }
.d-badge.mid { color:var(--mid); border-color:var(--mid); background:rgba(196,126,30,.06); }
.d-badge.low { color:var(--low); border-color:var(--low); background:rgba(26,122,58,.06); }
.d-badge.you { color:var(--you); border-color:var(--you); background:rgba(26,58,92,.06); }

.score-bar-row {
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:1px;
  background:var(--border);
  border:1px solid var(--border);
  margin-bottom:28px;
}
.score-cell {
  background:var(--surface);
  padding:12px 16px;
}
.score-cell-label {
  font-family:'IBM Plex Mono',monospace;
  font-size:8px;
  color:var(--text-dim);
  letter-spacing:2px;
  text-transform:uppercase;
  margin-bottom:6px;
}
.score-cell-val {
  font-family:'Playfair Display',serif;
  font-size:20px;
  font-weight:700;
  color:var(--you);
}

.d-section { margin-bottom:28px; }
.d-section-label {
  font-family:'IBM Plex Mono',monospace;
  font-size:9px;
  color:var(--text-dim);
  letter-spacing:3px;
  text-transform:uppercase;
  padding-bottom:8px;
  border-bottom:1px solid var(--border);
  margin-bottom:14px;
}
.d-body {
  font-size:14px;
  line-height:1.75;
  color:var(--text-mid);
}
.d-body strong { color:var(--text); font-weight:600; }

.d-list-item {
  display:flex;
  gap:12px;
  padding:7px 0;
  border-bottom:1px solid var(--surface2);
  font-size:13px;
  color:var(--text-mid);
  line-height:1.5;
}
.d-list-item:last-child { border-bottom:none; }
.d-plus { color:var(--low); font-weight:600; flex-shrink:0; width:12px; }
.d-minus { color:var(--high); font-weight:600; flex-shrink:0; width:12px; }

.tags-row { display:flex; flex-wrap:wrap; gap:6px; margin-top:16px; }
.tag {
  font-family:'IBM Plex Mono',monospace;
  font-size:9px;
  padding:3px 8px;
  border:1px solid var(--border);
  color:var(--text-dim);
  letter-spacing:1px;
  text-transform:uppercase;
}

.d-verdict {
  background:var(--surface2);
  border-left:3px solid var(--text);
  padding:16px 20px;
  margin-bottom:28px;
}
.d-verdict p {
  font-size:14px;
  line-height:1.7;
  color:var(--text-mid);
  font-style:italic;
}
.d-verdict p strong { color:var(--text); font-style:normal; }

.d-video-box {
  background:var(--surface2);
  border:1px solid var(--border);
  padding:16px 20px;
  margin-bottom:28px;
}
.d-video-label {
  font-family:'IBM Plex Mono',monospace;
  font-size:8px;
  color:var(--text-dim);
  letter-spacing:3px;
  text-transform:uppercase;
  margin-bottom:10px;
  display:flex;
  align-items:center;
  gap:8px;
}
.d-video-label::after { content:''; flex:1; height:1px; background:var(--border); }

.ai-section {
  border:1px solid var(--border);
  margin-bottom:28px;
}
.ai-section-header {
  background:var(--text);
  color:#fff;
  padding:10px 16px;
  font-family:'IBM Plex Mono',monospace;
  font-size:9px;
  letter-spacing:2px;
  text-transform:uppercase;
  display:flex;
  align-items:center;
  justify-content:space-between;
}
.ai-btn {
  background:#fff;
  color:var(--text);
  border:none;
  padding:5px 12px;
  font-family:'IBM Plex Mono',monospace;
  font-size:9px;
  letter-spacing:1px;
  text-transform:uppercase;
  cursor:pointer;
  transition:opacity .15s;
}
.ai-btn:hover { opacity:.8; }
.ai-btn:disabled { opacity:.4; cursor:not-allowed; }
.ai-body {
  padding:16px 20px;
  font-size:13px;
  line-height:1.7;
  color:var(--text-mid);
  display:none;
  min-height:60px;
}
.ai-body.on { display:block; }

.links-bar {
  display:flex;
  gap:1px;
  background:var(--border);
  border:1px solid var(--border);
}
.link-btn {
  flex:1;
  background:var(--surface);
  text-align:center;
  padding:10px;
  font-family:'IBM Plex Mono',monospace;
  font-size:10px;
  color:var(--text-mid);
  text-decoration:none;
  letter-spacing:1px;
  text-transform:uppercase;
  transition:background .1s, color .1s;
  display:block;
}
.link-btn:hover { background:var(--text); color:#fff; }
.link-btn.disabled { opacity:.3; cursor:default; pointer-events:none; }

.dots { display:inline-flex; gap:3px; align-items:center; }
.dots span { width:4px; height:4px; background:currentColor; border-radius:50%; animation:p 1.2s ease-in-out infinite; }
.dots span:nth-child(2){animation-delay:.2s;} .dots span:nth-child(3){animation-delay:.4s;}
@keyframes p{0%,100%{opacity:.3;transform:scale(.8);}50%{opacity:1;transform:scale(1);}}

/* THEME TOGGLE */
.theme-toggle {
  background: none;
  border: 1px solid var(--border);
  cursor: pointer;
  width: 32px;
  height: 32px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
  color: var(--text-dim);
  transition: all .15s;
  flex-shrink: 0;
}
.theme-toggle:hover { border-color: var(--text); color: var(--text); }

/* RESPONSIVE */
@media (max-width: 1100px) {
  :root { --list-w: 260px; }
  .topbar-meta { gap: 20px; }
  .detail-inner { padding: 28px 32px; }
  .d-headline { font-size: 38px; }
}

@media (max-width: 860px) {
  html, body { overflow: auto; }
  .topbar { grid-template-columns: 1fr; }
  .topbar-left { border-right: none; border-bottom: 1px solid var(--border); }
  .topbar-right { padding: 12px 16px; flex-wrap: wrap; gap: 12px; }
  .score-block { border-left: none; padding-left: 0; border-top: 1px solid var(--border); padding-top: 12px; width: 100%; }
  .main { grid-template-columns: 1fr; height: auto; }
  .list-panel { height: auto; max-height: 40vh; }
  .detail-panel { height: auto; overflow: visible; border-top: 2px solid var(--border2); }
  .ticker { display: none; }
  .detail-inner { padding: 20px 18px; }
  .d-headline { font-size: 32px; }
  div[style*="grid-template-columns:1fr 1fr"] { grid-template-columns: 1fr !important; }
}

@media (max-width: 600px) {
  .topbar-meta { gap: 12px; flex-wrap: wrap; }
  .meta-val { font-size: 18px; }
  .logo { font-size: 15px; }
  .d-headline { font-size: 26px; }
  .detail-inner { padding: 16px 14px; }
  :root { --list-w: 100%; }
  .links-bar { flex-direction: column; gap: 0; }
}
</style>
</head>
<body>

<!-- TOP BAR -->
<div class="topbar">
  <div class="topbar-left">
    <div style="flex:1">
      <div class="logo">GYEC <em>2026</em> Intel</div>
      <div class="logo-sub">Finals · Team 32 · Economists · HCI</div>
    </div>
    <button class="theme-toggle" onclick="toggleTheme()" id="themeBtn" title="Toggle dark/light mode">☀</button>
  </div>
  <div class="topbar-right">
    <div class="topbar-meta">
      <div class="meta-item">
        <div class="meta-val blue">59</div>
        <div class="meta-label">Finalists</div>
      </div>
      <div class="meta-item">
        <div class="meta-val red">7</div>
        <div class="meta-label">High Threat</div>
      </div>
      <div class="meta-item">
        <div class="meta-val orange">14</div>
        <div class="meta-label">Mid Threat</div>
      </div>
      <div class="meta-item">
        <div class="meta-val green">37</div>
        <div class="meta-label">Low Threat</div>
      </div>
      <div class="meta-item">
        <div class="meta-val blue">Jun 20</div>
        <div class="meta-label">Finals Date</div>
      </div>
    </div>
    <div class="score-block">
      <div>
        <div class="score-tag">Your Score</div>
        <div class="score-num">118<span class="score-denom">/150 Prelim</span></div>
      </div>
    </div>
  </div>
</div>

<!-- TICKER -->
<div class="ticker">
  <div class="ticker-inner" id="ticker"></div>
</div>

<!-- MAIN SPLIT -->
<div class="main">
  <div class="list-panel">
    <div class="list-search">
      <input type="text" placeholder="Search teams, countries..." oninput="filterTeams(this.value)">
    </div>
    <div class="list-scroll" id="tlist"></div>
  </div>
  <div class="detail-panel" id="panel">
    <div class="empty-state">
      <div class="empty-title">Select a team</div>
      <div class="empty-sub">Choose from the list to view intelligence report</div>
    </div>
  </div>

TEAMS.forEach(t => { if(!teamMap[t.num]) teamMap[t.num] = t; });
const ALL_TEAMS = Object.values(teamMap).sort((a,b) => {
  const order = {you:0,high:1,mid:2,low:3};
  return (order[a.threat]||3) - (order[b.threat]||3) || a.num - b.num;
});

function threatLabel(t){return{you:"YOUR TEAM",high:"HIGH THREAT",mid:"MID THREAT",low:"LOW THREAT"}[t]||"UNKNOWN";}
function threatColor(t){return{you:"var(--accent)",high:"var(--threat-high)",mid:"var(--threat-mid)",low:"var(--threat-low)"}[t]||"var(--text-dim)";}

function renderSidebar(){
  const sections = [{k:"you",label:"YOUR TEAM"},{k:"high",label:"HIGH THREAT"},{k:"mid",label:"MID THREAT"},{k:"low",label:"LOW THREAT"}];
  document.getElementById("tlist").innerHTML = sections.map(s => {
    const ts = ALL_TEAMS.filter(t=>t.threat===s.k);
    if(!ts.length) return '';
    return `<div class="sec-group" data-sec="${s.k}">
      <div class="sec-label">${s.label}</div>
      ${ts.map(t=>`<button class="tbtn" id="btn-${t.num}" onclick="showTeam(${t.num})">
        <span class="tnum">${t.num}</span>
        <span class="tname">${t.name}</span><span style="font-family:'DM Mono',monospace;font-size:9px;color:var(--text-dim);flex-shrink:0">${MEMBERS[t.num]||'?'}</span>
        <span class="tdot ${t.threat}"></span>
      </button>`).join("")}
    </div>`;
  }).join("");
}

function filterTeams(q){
  q = q.toLowerCase();
  document.querySelectorAll(".tbtn").forEach(b=>{
    b.style.display = b.textContent.toLowerCase().includes(q)?'':'none';
  });
  document.querySelectorAll(".sec-group").forEach(s=>{
    const vis = [...s.querySelectorAll(".tbtn")].some(b=>b.style.display!=='none');
    s.style.display = vis?'':'none';
  });
}

function showTeam(num){
  document.querySelectorAll(".tbtn").forEach(b=>b.classList.remove("active"));
  const btn = document.getElementById("btn-"+num);
  if(btn) btn.classList.add("active");
  const t = ALL_TEAMS.find(x=>x.num===num);
  if(!t) return;
  const col = threatColor(t.threat);
  const bp = `https://entreplanet.org/GYEC/submissions/2026/PR/submissions/${t.num}.pdf`;
  const vid = VL[t.num]||"";
  
  let strengths = t.strengths ? t.strengths.map(s=>`<div class="row"><span class="plus">+</span>${s}</div>`).join("") : '<div class="row"><span style="color:var(--text-dim)">Use AI Analyse to generate analysis</span></div>';
  let weaknesses = t.weaknesses ? t.weaknesses.map(w=>`<div class="row"><span class="minus">−</span>${w}</div>`).join("") : '<div class="row"><span style="color:var(--text-dim)">Use AI Analyse to generate analysis</span></div>';

    <div class="th">
      <div>
        <div class="ttitle" style="color:${col}">${t.name}</div>
        <div class="tsub">TEAM ${t.num} · ${t.country} · ${t.school} · ${MEMBERS[t.num]||'?'} MEMBERS</div>
        ${t.score?`<div style="font-family:'Bebas Neue',sans-serif;font-size:26px;color:var(--text-dim);margin-top:4px">PRELIM SCORE: <span style="color:var(--accent)">${t.score}/150</span></div>`:""}
      </div>
      <div class="tbadge ${t.threat}">${threatLabel(t.threat)}</div>
    </div>
    <div class="idea-block">
      <div class="idea-text">${t.idea||"Business plan content unavailable. Use AI Analyse to fetch."}</div>
      ${t.tags?`<div class="tags">${t.tags.map(tag=>`<span class="tag">${tag}</span>`).join("")}</div>`:""}
    </div>
    <div class="sec">
      <div class="slabel green">Strengths</div>
      ${strengths}
    </div>
    <div class="sec">
      <div class="slabel" style="color:var(--threat-high)">Weaknesses</div>
      ${weaknesses}
    </div>
    <div class="sec">
      <div class="slabel">Verdict</div>
      <div class="atext">${t.verdict||"Use AI Analyse to generate verdict."}</div>
    </div>
    ${t.video_notes?`<div class="sec"><div class="slabel orange">Video Analysis</div><div class="atext">${t.video_notes}</div></div>`:""}
    <div style="margin-top:20px;padding-top:20px;border-top:1px solid var(--border)">
      <div style="font-family:'DM Mono',monospace;font-size:9px;color:var(--text-dim);letter-spacing:2px;text-transform:uppercase;margin-bottom:10px">AI DEEP ANALYSIS — BP + VIDEO</div>
      <button class="ai-btn" onclick="aiAnalyse(${t.num})" id="ai-btn-${t.num}">⚡ AI ANALYSE BP + VIDEO</button>
      <div class="ai-res" id="ai-res-${t.num}"></div>
    </div>
    <div class="lrow">
      <a class="lbtn" href="${bp}" target="_blank">📄 Business Plan</a>
      ${vid?`<a class="lbtn" href="${vid}" target="_blank">🎥 Video</a>`:`<span class="lbtn" style="opacity:.3;cursor:default">🎥 No Link</span>`}
    </div>`;
}

async function aiAnalyse(num){
  const btn = document.getElementById("ai-btn-"+num);
  const res = document.getElementById("ai-res-"+num);
  const vid = VL[num]||"";
  btn.disabled=true;
  btn.innerHTML=`<span class="dots"><span></span><span></span><span></span></span> ANALYSING...`;
  res.className="ai-res on";
  res.innerHTML=`<span class="dots"><span></span><span></span><span></span></span> Fetching BP and video analysis...`;
  const vidNote = vid?`Also analyse their presentation video at ${vid} — assess production quality, on-camera presence, prototype shown, communication clarity, overall video score /5.`:"";
  try{
    const r = await fetch("https://api.anthropic.com/v1/messages",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({
        model:"claude-sonnet-4-20250514",max_tokens:1200,
        tools:[{type:"web_search_20250305",name:"web_search"}],
        system:`You are a competition intelligence analyst for Team 32 "Economists" (Hwa Chong Institution Singapore, prelim score 118/150) competing in GYEC 2026 Finals. Your prelim idea was MycoShield (mycelium + geopolymer disaster housing). GYEC judges on 4 criteria: Creativity & Innovation, Finance & Production, Marketing & Market Research, Communication. Analyse competitor teams on both BP and video. Be brutally honest and strategic. Format:

**IDEA** — one paragraph
**BP STRENGTHS** — 3-4 bullet points
**BP WEAKNESSES** — 3-4 bullet points  
**VIDEO ANALYSIS** — production quality, on-camera presence, prototype, communication score /5
**THREAT LEVEL** — High/Mid/Low + one sentence why
**VERDICT** — how does this compare to Economists? What can you learn? 3 sentences max.`,
        messages:[{role:"user",content:`Fetch and analyse BP for GYEC 2026 Team ${num}: https://entreplanet.org/GYEC/submissions/2026/PR/submissions/${num}.pdf ${vidNote}`}]
      })
    });
    const data = await r.json();
    const text = data.content?.filter(c=>c.type==="text").map(c=>c.text).join("\n")||"No analysis returned.";
    res.innerHTML = text.replace(/\*\*(.*?)\*\*/g,"<strong>$1</strong>").replace(/\n\n/g,"<br><br>").replace(/\n/g,"<br>");
    btn.innerHTML="✓ ANALYSED";
    btn.style.cssText="background:var(--surface2);color:var(--accent);border:1px solid var(--accent);padding:9px 18px;font-family:'DM Mono',monospace;font-size:10px;letter-spacing:2px;cursor:default;";
  }catch(e){
    res.innerHTML=`Error: ${e.message}`;
    btn.disabled=false;
    btn.innerHTML="⚡ RETRY";
  }
}
